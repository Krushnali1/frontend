<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body{
    font-family: Poppins, sans-serif;
    background: linear-gradient(135deg,#141e30,#243b55);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:35px;
    width:400px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    font-weight:500;
}

input[type="text"],
input[type="email"],
input[type="password"]{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    border:1px solid #ccc;
}

.role-options{
    display:flex;
    justify-content:space-between;
    margin-top:8px;
}

.role-options label{
    display:flex;
    align-items:center;
    gap:6px;
    font-weight:400;
    cursor:pointer;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2a5298;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:500;
    transition:0.3s;
}

button:hover{
    background:#1e3c72;
}

.message{
    text-align:center;
    margin-top:12px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h2>Create Account</h2>

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your name">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" placeholder="Enter your email">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter your password">
</div>

<div class="form-group">
<label>Role</label>
<div class="role-options">
<label>
<input type="radio" name="role" value="Fresher">
Fresher
</label>

<label>
<input type="radio" name="role" value="Experienced">
Experienced
</label>
</div>
</div>

<button onclick="registerUser()">Create Account</button>

<div class="message" id="msg"></div>

</div>

<script>
function registerUser(){
let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;
let role=document.querySelector('input[name="role"]:checked');

if(name==""||email==""||password==""||!role){
document.getElementById("msg").innerHTML="Please fill all fields!";
document.getElementById("msg").style.color="red";
return;
}

let user={name,email,password,role:role.value};
localStorage.setItem("user",JSON.stringify(user));

document.getElementById("msg").innerHTML="Account Created Successfully!";
document.getElementById("msg").style.color="green";

setTimeout(()=>{
window.location.href="login.html";
},1500);
}
</script>

</body>
</html>
